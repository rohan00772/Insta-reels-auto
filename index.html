<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insta Reel No Login</title>

<style>
body{
  margin:0;
  background:#0f172a;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  width:400px;
  background:#1e293b;
  padding:20px;
  border-radius:12px;
}

textarea,input{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
}

button{
  width:100%;
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#e1306c;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="box">

<h2>No Login Reel Player</h2>

<textarea id="links" rows="6"
placeholder="Paste Reel Links"></textarea>

<input type="number" id="count" value="2" min="1">

<button onclick="playReels()">START</button>

</div>

<script>

function convert(url){

  url = url.trim();

  // extract reel id
  let match = url.match(/reel\/([^\/]+)/);

  if(match){

    let id = match[1];

    // anonymous viewer
    return `https://www.ddinstagram.com/reel/${id}`;
  }

  return url;
}

function playReels(){

  let text =
    document.getElementById("links").value.trim();

  let count =
    parseInt(
      document.getElementById("count").value
    );

  if(!text){
    alert("Links daalo");
    return;
  }

  let links = text.split("\n");

  for(let i=0;i<count;i++){

    let url =
      convert(
        links[i % links.length]
      );

    window.open(
      url,
      "_blank",
      `width=500,height=700,left=${i*40},top=${i*40}`
    );
  }
}

</script>

</body>
</html>
