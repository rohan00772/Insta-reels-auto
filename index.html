<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram Multi Window Launcher</title>

  <style>
    body{
      margin:0;
      padding:0;
      background:#0f172a;
      font-family:Arial, sans-serif;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      width:400px;
      background:#1e293b;
      padding:20px;
      border-radius:12px;
      box-shadow:0 0 15px rgba(0,0,0,0.5);
    }

    h2{
      text-align:center;
      margin-bottom:20px;
    }

    textarea,input{
      width:100%;
      margin-top:10px;
      padding:10px;
      border:none;
      border-radius:8px;
      font-size:14px;
      outline:none;
    }

    button{
      width:100%;
      padding:12px;
      margin-top:15px;
      border:none;
      border-radius:8px;
      background:#e1306c;
      color:white;
      font-size:16px;
      cursor:pointer;
    }

    button:hover{
      background:#ff4f8b;
    }

    .note{
      margin-top:10px;
      font-size:12px;
      color:#cbd5e1;
    }
  </style>
</head>

<body>

<div class="box">

  <h2>Instagram Multi Window</h2>

  <label>Instagram Links</label>

  <textarea id="links" rows="6"
  placeholder="https://instagram.com
https://instagram.com/example"></textarea>

  <label>Kitni Window Open Karni Hai?</label>

  <input type="number" id="count" value="2" min="1">

  <button onclick="startOpen()">
    START
  </button>

  <div class="note">
    Browser popup blocker OFF hona chahiye
  </div>

</div>

<script>

function startOpen(){

  let linksText =
    document.getElementById("links").value.trim();

  let count =
    parseInt(document.getElementById("count").value);

  if(!linksText){
    alert("Instagram links daalo");
    return;
  }

  let links =
    linksText.split("\n");

  for(let i=0; i<count; i++){

    let url =
      links[i % links.length];

    let left = i * 40;
    let top  = i * 40;

    window.open(
      url,
      "_blank",
      `width=500,height=700,left=${left},top=${top}`
    );
  }

  alert(count + " windows open ho gayi");
}

</script>

</body>
</html>
