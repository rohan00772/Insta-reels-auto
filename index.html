<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Reel Player</title>

<style>
body{
  margin:0;
  background:#0f172a;
  font-family:Arial;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  width:400px;
  background:#1e293b;
  padding:20px;
  border-radius:12px;
}

textarea,input{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
}

button{
  width:100%;
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#e1306c;
  color:white;
  font-size:16px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="box">

<h2>Instagram Reel Auto Player</h2>

<textarea id="links" rows="6"
placeholder="Paste Reel Links Here"></textarea>

<input type="number" id="count" value="2" min="1">

<button onclick="openReels()">START</button>

</div>

<script>

function convertToEmbed(url){

  url = url.trim();

  if(url.includes("/reel/")){
    return url + "embed";
  }

  return url;
}

function openReels(){

  let text =
    document.getElementById("links").value.trim();

  let count =
    parseInt(document.getElementById("count").value);

  if(!text){
    alert("Links daalo");
    return;
  }

  let links = text.split("\n");

  for(let i=0;i<count;i++){

    let url =
      convertToEmbed(
        links[i % links.length]
      );

    let win = window.open(
      "",
      "_blank",
      `width=500,height=700,left=${i*40},top=${i*40}`
    );

    win.document.write(`
      <html>
      <body style="margin:0;background:black;display:flex;justify-content:center;align-items:center;height:100vh;">
      
      <iframe
        src="${url}"
        width="100%"
        height="100%"
        frameborder="0"
        allowfullscreen>
      </iframe>

      </body>
      </html>
    `);
  }
}

</script>

</body>
</html>
